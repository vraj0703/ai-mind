version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Calcutta
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Group dev deps + minor/patch bumps to keep PR noise low; surface
      # majors individually since they may need behavior review.
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Calcutta
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github_actions
